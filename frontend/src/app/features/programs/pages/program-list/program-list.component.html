<p-panel class="overflow-auto">
  <p-table
    [columns]="cols"
    [stripedRows]="true"
    [value]="programsResource.value()?.data ?? []"
    [tableStyle]="{ 'min-width': '60rem' }"
  >
    <ng-template #caption>
      <div class="flex items-center justify-between">
        <span class="text-xl font-bold">Program List</span>
        <p-button
          severity="secondary"
          rounded="true"
          icon="pi pi-refresh"
          (click)="programsResource.reload()"
        />
      </div>
    </ng-template>
    <ng-template #header>
      <tr>
        @for (col of cols; track $index){
        <th>
          {{ col.header }}
        </th>
        }
        <th>Options</th>
      </tr>
    </ng-template>
    <ng-template #body let-rowData let-columns="columns">
      <tr>
        @for (col of columns; track $index){
        <td>
          @if(rowData[col.field]?.id){
          <!--  -->
          @switch (col.field){ @case ('level'){
          {{ rowData[col.field]?.code }}
          } } }
          <!--  -->
          @else {
          <!--  -->
          @switch (col.field) { @default {
          {{ rowData[col.field] }}
          }} }
        </td>
        }
        <td>
          <div class="flex items-center gap-2">
            <p-menu
              #menu
              [model]="actionButtons"
              [popup]="true"
              appendTo="body"
            ></p-menu>
            <p-button
              (click)="selectedItem.set(rowData); menu.toggle($event)"
              size="small"
              severity="secondary"
              icon="pi pi-ellipsis-v"
            />
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</p-panel>
<p-confirmDialog />
